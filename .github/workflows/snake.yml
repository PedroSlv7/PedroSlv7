name: Generate Snake

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Generate snake
    uses: Platane/snk@v3
    with:
      github_user_name: PedroSlv7
      outputs: dist/snake.svg

  - name: Push snake
    uses: crazy-max/ghaction-github-pages@v3
    with:
      target_branch: output
      build_dir: dist
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
